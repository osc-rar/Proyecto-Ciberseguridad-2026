<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Dev - Version Vulnerable</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Portafolio Dev</h1>
        <p class="subtitle">Version Vulnerable - Proyecto Ciberseguridad 2026</p>
    </header>

    <main>
        <section id="seccion-formulario">
            <h2>Crear Perfil</h2>
            <form id="form-perfil">
                <div class="campo">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="campo">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido">
                </div>
                <div class="campo">
                    <label for="bio">Biografia</label>
                    <textarea id="bio" name="bio" rows="3"></textarea>
                </div>
                <div class="campo">
                    <label for="url_repositorio">URL del Repositorio *</label>
                    <!--
                        NOTA DE SEGURIDAD: este campo es el punto de entrada del
                        ataque SSRF (OWASP API7:2023 / CWE-918) y esta declarado
                        como type="text", por lo que el navegador acepta cualquier
                        cadena (file:///etc/passwd, http://127.0.0.1:22, etc.).
                        Usar type="url" daria una validacion basica de formato en
                        el cliente y evitaria errores del usuario legitimo.
                        IMPORTANTE: esa validacion NO sustituye a la del servidor.
                        Cualquier control del navegador se puede saltar con curl o
                        Burp; la defensa real es url_repositorio_es_segura() en
                        backend/crear_perfil.php (allowlist de dominios, esquema
                        http/https y bloqueo de IPs privadas/reservadas).
                    -->
                    <input type="text" id="url_repositorio" name="url_repositorio" placeholder="https://github.com/usuario/repo" required>
                    <small>Introduce la URL de un repositorio para obtener su informacion.</small>
                </div>
                <button type="submit">Crear Perfil</button>
            </form>
            <div id="resultado-crear"></div>
        </section>

        <section id="seccion-portafolio">
            <h2>Mi Portafolio</h2>
            <button id="btn-cargar-portafolio">Cargar Portafolio</button>
            <div id="perfil-info"></div>
            <div id="lista-repos"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
